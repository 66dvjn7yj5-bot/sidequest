<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Sidequests – Cyber</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0a0914" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <div class="brand">
        <div class="mark">◇</div>
        <div>
          <h1>Sidequests</h1>
          <div class="brand-sub">Neon Daily Protocol</div>
        </div>
      </div>

      <div class="status">
        <div class="level-card" id="levelCard" aria-live="polite">
          <div class="level-label">Level</div>
          <div class="level-value" id="levelValue">1</div>
        </div>

        <div class="chip neon" title="XP im aktuellen Level">
          <span>✨</span><span id="xp">0 XP</span>
        </div>

        <div class="chip" id="totalDoneChip" title="Insgesamt erledigte Aufgaben">
          <span>✓</span><span id="totalDone">0 gesamt</span>
        </div>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="panel">
      <div class="panel-head">
        <h3>Level‑Fortschritt</h3>
        <div class="muted small" id="nextLevelInfo">0/100 XP bis Level 2</div>
      </div>
      <div class="xpbar">
        <div class="xpbar-fill" id="xpFill" style="width:0%"></div>
      </div>
    </section>

    <section class="panel timer-panel">
      <div class="timer-left">
        <div class="timer-title">Nächster Reset</div>
        <div class="timer-value"><span id="resetH">00</span>:<span id="resetM">00</span></div>
      </div>
      <div class="timer-right">
        <button id="reroll" class="btn btn-reroll" title="Neue Aufgaben (1×/Tag)">
          <span class="btn-ico" aria-hidden="true">⟳</span>
          Neue Aufgaben
        </button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h3>Heutige Aufgaben</h3>
        <div class="filter">
          <button class="filter-btn active" data-filter="all">Alle</button>
          <button class="filter-btn" data-filter="todo">Unerledigt</button>
          <button class="filter-btn" data-filter="done">Erledigt</button>
        </div>
      </div>
      <div id="tasksCount" class="muted small"></div>
      <div id="questList" class="list" aria-live="polite"></div>
      <div class="panel-foot small muted">
        Tägliche Auswahl: 4 leicht, 4 mittel, 3 schwer und 1 super schwer. XP werden beim Level‑Up auf 0 zurückgesetzt.
      </div>
    </section>
  </main>

  <div class="scanlines" aria-hidden="true"></div>
  <canvas id="hoverParticles" aria-hidden="true"></canvas>
  <audio id="uiClick" preload="auto">
    <source src="data:audio/wav;base64,UklGRoQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABYAAAAgAABkYXRhYQAAAAAA/////wAAAP///+Hh4eDg4N/f39vb29nZ2dPT08/Pz8vLy8bGxsbGxoaGhgYGBQUFBMTEw8PDwAAAA" type="audio/wav">
  </audio>
  <script src="app.js"></script>
</body>
</html>
