<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Sidequests – Daily</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#10121a" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <div class="brand">
        <div class="logo">◇</div>
        <div class="brand-text">
          <div class="title">Sidequests</div>
          <div class="subtitle">Tägliche Mini‑Challenges</div>
        </div>
      </div>
      <div class="status">
        <div class="level">
          <span class="level-label">Level</span>
          <span class="level-value" id="levelValue">1</span>
        </div>
        <div class="chip" id="xpChip">✨ <span id="xpText">0/100 XP</span></div>
        <div class="chip" id="doneChip">✓ <span id="doneText">0 gesamt</span></div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <div class="panel-head">
        <h3>Fortschritt</h3>
        <div class="muted small" id="nextLevelInfo">0/100 XP bis Level 2</div>
      </div>
      <div class="bar">
        <div class="bar-fill" id="xpBar" style="width:0%"></div>
      </div>
    </section>

    <section class="panel panel-row">
      <div class="timer">
        <div class="timer-label">Nächster Reset</div>
        <div class="timer-value"><span id="resetH">00</span>:<span id="resetM">00</span></div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="rerollBtn" title="Neue Aufgaben (1×/Tag)">
          ⟳ Neue Aufgaben
        </button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h3>Heutige Aufgaben</h3>
        <div class="filters">
          <button class="filter active" data-filter="all">Alle</button>
          <button class="filter" data-filter="todo">Unerledigt</button>
          <button class="filter" data-filter="done">Erledigt</button>
        </div>
      </div>
      <div class="muted small" id="tasksCounter">0/12 abgeschlossen</div>
      <div id="list" class="task-list" aria-live="polite"></div>
      <div class="panel-foot muted small">
        Verteilung: 4 leicht, 4 mittel, 3 schwer, 1 super (aus Pool). Reroll 1×/Tag. Progressives XP‑Level‑System.
      </div>
    </section>
  </main>

  <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js"></script>
</body>
</html>
