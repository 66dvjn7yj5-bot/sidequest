<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Daily Sidequests – MVP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="container">
    <div class="brand">
      <div class="logo">Q</div>
      <h1>Daily Sidequests</h1>
    </div>
    <div class="statusbar">
      <span class="pill">Coins: <b id="coins">0</b></span>
      <span class="pill">XP: <b id="xp">0</b></span>
      <span class="pill">Level: <b id="level">1</b></span>
      <span class="pill">Streak: <b id="streak">0</b> Tage</span>
      <span class="pill">Reset um <b id="resetTime">–</b></span>
    </div>
  </div>
</header>

<main class="container" style="padding-top:1rem;">
  <div class="grid">
    <section class="card">
      <div class="row">
        <h2>Heutige Sidequests</h2>
        <div class="row" style="gap:.5rem">
          <button id="reroll" class="btn-ghost">Reroll (1x/Tag)</button>
          <span id="dailyInfo" class="hint"></span>
        </div>
      </div>
      <div class="quests" id="questList"></div>
      <div class="footer-note">
        Tipp: Erledige die Quests und sammle Coins & XP. Nutze Coins im Shop, um deinen Avatar auszustatten.
      </div>
    </section>

    <aside class="card">
      <h2>Dein Avatar</h2>
      <div class="avatar-wrap">
        <div class="avatar" id="avatar">
          <svg class="av-hat" id="hat" width="90" height="50" viewBox="0 0 100 60" style="display:none">
            <path d="M15 45 Q50 5 85 45 Z" fill="#7cf1c6" stroke="#0b0f1b" stroke-width="3"/>
            <rect x="25" y="43" width="50" height="8" fill="#0b0f1b" opacity=".6"/>
          </svg>
          <div class="av-face">
            <div class="av-eyes"><div class="eye"></div><div class="eye"></div></div>
          </div>
          <div class="av-mouth"></div>
          <svg class="av-accessory" id="acc" width="120" height="40" viewBox="0 0 120 40" style="display:none">
            <rect x="20" y="10" width="80" height="20" rx="10" fill="#8aa9ff" stroke="#0b0f1b" stroke-width="3"/>
          </svg>
        </div>
      </div>
      <div class="row">
        <div class="badge"><span>Ausgerüstet:</span> <span id="equipped">—</span></div>
        <button id="unequip" class="btn-ghost">Ablegen</button>
      </div>
      <div class="sep"></div>
      <h2>Shop</h2>
      <div id="shop" class="shop-grid"></div>
      <div class="sep"></div>
      <h2>Inventar</h2>
      <div id="inventory" class="inv"></div>
    </aside>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
