<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Sidequests – Cyber</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0a0914" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <div class="brand">
        <div class="mark">◇</div>
        <div>
          <h1>Sidequests</h1>
          <div class="brand-sub">Neon Daily Protocol</div>
        </div>
      </div>
      <div class="status">
        <div class="chip neon"><span>🪙</span><span id="coins">0</span></div>
        <div class="chip neon"><span>✨</span><span id="xp">0</span></div>
        <div class="chip neon"><span>⬢</span><span id="level">1</span></div>
        <div class="chip streak"><span>🔥</span><span id="streak">0</span></div>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="panel timer-panel">
      <div class="timer-left">
        <div class="timer-title">Nächster Reset</div>
        <div class="timer-value"><span id="resetH">00</span>:<span id="resetM">00</span></div>
      </div>
      <div class="timer-right">
        <button id="reroll" class="btn btn-reroll">
          <span class="btn-ico" aria-hidden="true">⟳</span>
          Neue Fragen
        </button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Heutige Fragen</h2>
        <span id="tasksCount" class="muted small"></span>
      </div>
      <div id="questList" class="list" aria-live="polite"></div>
      <div class="panel-foot small muted">
        Halte deinen 🔥‑Streak durch tägliche Besuche. Reroll ist jederzeit möglich.
      </div>
    </section>
  </main>

  <div class="scanlines" aria-hidden="true"></div>
  <script src="app.js"></script>
</body>
</html>
